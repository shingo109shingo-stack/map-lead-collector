/* ============================================
   Utility Functions
   ============================================ */
function determinePriority(website, ratingsTotal) {
  if (!website) return ratingsTotal <= 50 ? "最高" : "高";
  return "中";
}
function prioritySortKey(p) { return {"最高":0,"高":1,"中":2}[p]??99; }

function toCSVString(records) {
  const BOM = "\uFEFF";
  const headers = ["店名","業種","住所","電話番号","HP URL","HP有無","Google評価","口コミ数","優先度","収集日時"];
  const rows = records.map(r =>
    headers.map(h => {
      const v = String(r[h]??"");
      return v.includes(",") || v.includes('"') || v.includes("\n") ? `"${v.replace(/"/g,'""')}"` : v;
    }).join(",")
  );
  return BOM + [headers.join(","), ...rows].join("\n");
}

function renderStars(rating) {
  const full = Math.floor(rating);
  const half = rating - full >= 0.3;
  const stars = [];
  for (let i=0;i<5;i++) {
    if (i < full) stars.push(<StarIcon key={i} filled cls="text-yellow-400" />);
    else if (i === full && half) stars.push(<StarIcon key={i} filled cls="text-yellow-400 opacity-50" />);
    else stars.push(<StarIcon key={i} cls="text-gray-300" />);
  }
  return <span style={{display:"flex",alignItems:"center",gap:"2px"}}>{stars}<span className="ml-1 text-xs text-gray-500 font-medium">{rating}</span></span>;
}

  if (cat === "飲食店") return "🍽️";
  if (cat === "美容室") return "✂️";
  if (cat === "整骨院") return "💆";
  return "📍";
}

/* ============================================
   Main App
   ============================================ */
function App() {
  const [area, setArea] = useState("");
  const [category, setCategory] = useState("飲食店");
  const [results, setResults] = useState([]);
  const [isRunning, setIsRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [totalItems, setTotalItems] = useState(0);
  const [currentStore, setCurrentStore] = useState("");
  const [filterPriority, setFilterPriority] = useState("all");
  const [usage, setUsage] = useState({ monthly: 0, daily: 0 });
  const [history, setHistory] = useState([]);
  const [showAreaDropdown, setShowAreaDropdown] = useState(false);
  const [logs, setLogs] = useState([]);
  const logRef = useRef(null);

  const addLog = useCallback((msg) => {
    setLogs(prev => [...prev, { time: new Date().toLocaleTimeString("ja-JP"), msg }]);
  }, []);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logs]);

  const runCollection = useCallback(async () => {
    if (!area.trim()) return;
    setIsRunning(true); setResults([]); setProgress(0); setLogs([]); setFilterPriority("all");

    addLog("🚀 収集開始: " + area + " × " + category);
    addLog("📡 Text Search API 呼び出し中...");
    await new Promise(r => setTimeout(r, 700));

    const stores = DEMO_DATA[category] || DEMO_DATA["飲食店"];
    const adjusted = stores.map(s => ({
      ...s, address: area.includes("大阪市北区") ? s.address : s.address.replace("大阪府大阪市北区", area)
    }));

    setTotalItems(adjusted.length);
    setUsage(prev => ({ monthly: prev.monthly + 1, daily: prev.daily + 1 }));
    addLog("✅ " + adjusted.length + " 件の店舗を検出");

    const collected = [];
    const now = new Date().toLocaleString("ja-JP");

    for (let i = 0; i < adjusted.length; i++) {
      const s = adjusted[i];
      setProgress(i + 1);
      setCurrentStore(s.name);
      const priority = determinePriority(s.website, s.ratings_total);
      collected.push({
        "店名": s.name, "業種": category, "住所": s.address, "電話番号": s.phone,
        "HP URL": s.website, "HP有無": s.website ? "あり" : "なし",
        "Google評価": s.rating, "口コミ数": s.ratings_total, "優先度": priority, "収集日時": now,
      });
      setUsage(prev => ({ monthly: prev.monthly + 1, daily: prev.daily + 1 }));
      addLog("[" + (i+1) + "/" + adjusted.length + "] " + s.name + " → " + priority);
      await new Promise(r => setTimeout(r, 100));
    }

    collected.sort((a,b) => prioritySortKey(a["優先度"]) - prioritySortKey(b["優先度"]));
    setResults(collected); setCurrentStore("");

    const saikou = collected.filter(r => r["優先度"]==="最高").length;
    const kou = collected.filter(r => r["優先度"]==="高").length;
    const chuu = collected.filter(r => r["優先度"]==="中").length;
    addLog("🎉 収集完了！ 最高=" + saikou + " / 高=" + kou + " / 中=" + chuu);

    setHistory(prev => [{ area, category, count: collected.length, saikou, kou, chuu, date: now }, ...prev.slice(0, 9)]);
    setIsRunning(false);
  }, [area, category, addLog]);

  const downloadCSV = useCallback(() => {
    const filtered = filterPriority === "all" ? results : results.filter(r => r["優先度"] === filterPriority);
    const csv = toCSVString(filtered);
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url;
    a.download = new Date().toISOString().slice(0,10) + "_" + area + "_" + category + ".csv";
    a.click(); URL.revokeObjectURL(url);
    addLog("📥 CSV ダウンロード: " + filtered.length + "件");
  }, [results, filterPriority, area, category, addLog]);

  const filtered = filterPriority === "all" ? results : results.filter(r => r["優先度"] === filterPriority);
  const cnt = { "最高": results.filter(r=>r["優先度"]==="最高").length, "高": results.filter(r=>r["優先度"]==="高").length, "中": results.filter(r=>r["優先度"]==="中").length };
  const usagePct = Math.min(100, (usage.monthly / 3000) * 100);

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <header className="glass" style={{position:"sticky",top:0,zIndex:30,borderBottom:"1px solid #e2e8f0"}}>
        <div style={{maxWidth:"1280px",margin:"0 auto",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
            <div style={{width:40,height:40,borderRadius:12,background:"linear-gradient(135deg,#2563eb,#4f46e5)",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 12px rgba(37,99,235,0.3)"}}>
              <MapPinIcon size={20} cls="text-white" />
            </div>
            <div>
              <h1 style={{fontSize:18,fontWeight:800,color:"#1e293b",lineHeight:1.2}}>MAP Lead Collector</h1>
              <p style={{fontSize:11,color:"#94a3b8"}}>Googleマップ HP制作営業リスト自動収集</p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"12px",flexWrap:"wrap"}}>
            <div style={{background:"#f1f5f9",borderRadius:10,padding:"6px 14px",display:"flex",alignItems:"center",gap:8,fontSize:12}}>
              <BarChartIcon size={13} cls="text-gray-400" />
              <span style={{color:"#64748b"}}>月間</span>
              <span style={{fontWeight:700,color:"#334155"}}>{usage.monthly.toLocaleString()}</span>
              <span style={{color:"#94a3b8"}}>/ 3,000</span>
              <div style={{width:50,height:4,background:"#e2e8f0",borderRadius:2,overflow:"hidden"}}>
                <div style={{width:usagePct+"%",height:"100%",background:usagePct>90?"#ef4444":usagePct>70?"#f59e0b":"#22c55e",borderRadius:2,transition:"width 0.5s"}}/>
              </div>
            </div>
            <div style={{background:"#f1f5f9",borderRadius:10,padding:"6px 14px",display:"flex",alignItems:"center",gap:8,fontSize:12}}>
              <ClockIcon size={13} cls="text-gray-400" />
              <span style={{color:"#64748b"}}>本日</span>
              <span style={{fontWeight:700,color:"#334155"}}>{usage.daily}</span>
              <span style={{color:"#94a3b8"}}>/ 100</span>
            </div>
          </div>
        </div>
      </header>

      <div style={{maxWidth:1280,margin:"0 auto",padding:"24px 16px"}}>
        {/* Search Panel */}
        <div className="slide-up" style={{background:"#fff",borderRadius:20,boxShadow:"0 4px 24px rgba(0,0,0,0.06)",border:"1px solid #e2e8f0",padding:24,marginBottom:24}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:16,alignItems:"flex-end"}}>
            <div style={{flex:"1 1 260px",position:"relative"}}>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>エリア</label>
              <div style={{position:"relative"}}>
                <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)"}}><MapPinIcon size={16} cls="text-gray-400" /></div>
                <input type="text" placeholder="例: 大阪市北区" value={area}
                  onChange={e=>setArea(e.target.value)}
                  onFocus={()=>setShowAreaDropdown(true)}
                  onBlur={()=>setTimeout(()=>setShowAreaDropdown(false),200)}
                  disabled={isRunning}
                  style={{width:"100%",paddingLeft:40,paddingRight:16,paddingTop:10,paddingBottom:10,borderRadius:14,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:14,outline:"none"}}
                />
                {showAreaDropdown && (
                  <div style={{position:"absolute",top:"100%",left:0,right:0,marginTop:4,background:"#fff",border:"1px solid #e2e8f0",borderRadius:14,boxShadow:"0 12px 40px rgba(0,0,0,0.1)",zIndex:20,maxHeight:220,overflowY:"auto"}}>
                    {AREA_PRESETS.filter(a => !area || a.includes(area)).map(a => (
                      <button key={a} onMouseDown={()=>{setArea(a);setShowAreaDropdown(false)}}
                        style={{display:"block",width:"100%",textAlign:"left",padding:"10px 16px",fontSize:13,border:"none",background:"transparent",cursor:"pointer"}}
                        onMouseOver={e=>e.target.style.background="#eff6ff"}
                        onMouseOut={e=>e.target.style.background="transparent"}>
                        {a}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div style={{width:200}}>
              <label style={{display:"block",fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em"}}>業種</label>
              <select value={category} onChange={e=>setCategory(e.target.value)} disabled={isRunning}
                style={{width:"100%",padding:"10px 36px 10px 16px",borderRadius:14,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:14,appearance:"none",outline:"none",cursor:"pointer"}}>
                <option value="飲食店">🍽️ 飲食店</option>
                <option value="美容室">✂️ 美容室</option>
                <option value="整骨院">💆 整骨院</option>
              </select>
            </div>

            <button onClick={runCollection} disabled={isRunning || !area.trim()}
              className={isRunning || !area.trim() ? "" : "btn-primary"}
              style={{padding:"10px 32px",borderRadius:14,fontSize:14,fontWeight:700,border:"none",cursor: isRunning||!area.trim()?"not-allowed":"pointer",
                display:"flex",alignItems:"center",gap:8,color:isRunning||!area.trim()?"#94a3b8":"#fff",
                background:isRunning||!area.trim()?"#e2e8f0":undefined,transition:"all 0.2s",whiteSpace:"nowrap"}}>
              {isRunning ? (
                <><svg className="animate-spin" width="16" height="16" viewBox="0 0 24 24"><circle opacity=".25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path opacity=".75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> 収集中...</>
              ) : (
                <><SearchIcon size={16} /> 収集開始</>
              )}
            </button>
          </div>

          {isRunning && (
            <div className="fade-in" style={{marginTop:20}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#64748b",marginBottom:6}}>
                <span style={{display:"flex",alignItems:"center",gap:6}}>
                  <ZapIcon size={12} cls="text-yellow-500 pulse-anim" />
                  {currentStore}
                </span>
                <span className="font-mono">{progress} / {totalItems}</span>
              </div>
              <div style={{width:"100%",background:"#f1f5f9",borderRadius:999,height:8,overflow:"hidden"}}>
                <div className="progress-bar" style={{width:(totalItems?(progress/totalItems)*100:0)+"%",height:"100%",background:"linear-gradient(90deg,#3b82f6,#6366f1)",borderRadius:999}}/>
              </div>
            </div>
          )}
        </div>

        {/* Results */}
        {results.length > 0 && (
          <div className="slide-up">
            {/* Summary Cards */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(140px, 1fr))",gap:12,marginBottom:20}}>
              <div style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",padding:20,textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                <div style={{fontSize:32,fontWeight:900,color:"#334155"}}>{results.length}</div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>総件数</div>
              </div>
              {[["最高","#dc2626","card-saikou","ring-active-saikou"],["高","#f97316","card-kou","ring-active-kou"],["中","#0ea5e9","card-chuu","ring-active-chuu"]].map(([p,color,cardCls,ringCls])=>(
                <button key={p} onClick={()=>setFilterPriority(prev=>prev===p?"all":p)}
                  className={cardCls + (filterPriority===p?" "+ringCls:"")}
                  style={{background:"#fff",borderRadius:16,border:"1px solid #e2e8f0",padding:20,textAlign:"center",cursor:"pointer",transition:"all 0.2s",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                  <div style={{fontSize:32,fontWeight:900,color}}>{cnt[p]}</div>
                  <div style={{fontSize:11,color:"#94a3b8",marginTop:2,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
                    <span style={{width:8,height:8,borderRadius:999,background:color,display:"inline-block"}}/>
                    優先度 {p}
                  </div>
                </button>
              ))}
              <button onClick={downloadCSV} className="btn-csv"
                style={{borderRadius:16,padding:20,textAlign:"center",cursor:"pointer",color:"#fff",border:"none",transition:"all 0.2s",boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}>
                <DownloadIcon size={28} cls="mx-auto" />
                <div style={{fontSize:12,fontWeight:700,marginTop:6}}>CSV出力</div>
              </button>
            </div>

            {/* Filter Badge */}
            {filterPriority !== "all" && (
              <div className="fade-in" style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,fontSize:12,color:"#64748b"}}>
                <FilterIcon cls="text-gray-400" />
                フィルター: 優先度「{filterPriority}」のみ表示中
                <button onClick={()=>setFilterPriority("all")} style={{color:"#3b82f6",background:"none",border:"none",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:2}}>
                  <XIcon size={12} /> 解除
                </button>
              </div>
            )}

            {/* Table */}
            <div style={{background:"#fff",borderRadius:20,boxShadow:"0 4px 24px rgba(0,0,0,0.06)",border:"1px solid #e2e8f0",overflow:"hidden",marginBottom:24}}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",fontSize:13,borderCollapse:"collapse"}}>
                  <thead>
                    <tr style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0"}}>
                      {["#","店名","住所","電話","HP","評価","口コミ","優先度"].map(h=>(
                        <th key={h} style={{textAlign:["#","店名","住所","電話"].includes(h)?"left":"center",padding:"12px 16px",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.map((r,i) => {
                      const isSaikou = r["優先度"]==="最高";
                      return (
                        <tr key={i} className="table-row" style={{borderBottom:"1px solid #f1f5f9",background:isSaikou?"#fef2f2":"transparent",transition:"background 0.15s"}}>
                          <td style={{padding:"10px 16px",color:"#94a3b8",fontSize:11}}>{i+1}</td>
                          <td style={{padding:"10px 16px"}}>
                            <span style={{display:"flex",alignItems:"center",gap:8}}>
                              <span>{catEmoji(r["業種"])}</span>
                              <span style={{fontWeight:600,color:"#1e293b"}}>{r["店名"]}</span>
                            </span>
                          </td>
                          <td style={{padding:"10px 16px",color:"#64748b",fontSize:12,maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r["住所"]}</td>
                          <td style={{padding:"10px 16px"}}>
                            {r["電話番号"] ? (
                              <span style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:"#475569"}}><PhoneIcon size={11} cls="text-gray-400" />{r["電話番号"]}</span>
                            ) : <span style={{color:"#cbd5e1",fontSize:12}}>-</span>}
                          </td>
                          <td style={{padding:"10px 16px",textAlign:"center"}}>
                            {r["HP URL"] ? (
                              <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 10px",borderRadius:999,background:"#f0f9ff",color:"#0284c7",fontSize:11,fontWeight:500}}>
                                <GlobeIcon size={11} />あり
                              </span>
                            ) : (
                              <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 10px",borderRadius:999,background:"#fef2f2",color:"#ef4444",fontSize:11,fontWeight:700}}>
                                <AlertIcon size={11} />なし
                              </span>
                            )}
                          </td>
                          <td style={{padding:"10px 16px",textAlign:"center"}}>{renderStars(r["Google評価"])}</td>
                          <td style={{padding:"10px 16px",textAlign:"center",fontSize:12,color:"#475569"}} className="font-mono">{r["口コミ数"]}</td>
                          <td style={{padding:"10px 16px",textAlign:"center"}}>
                            <span className={"badge-"+(r["優先度"]==="最高"?"saikou":r["優先度"]==="高"?"kou":"chuu")}
                              style={{display:"inline-flex",alignItems:"center",gap:3,padding:"4px 12px",borderRadius:999,color:"#fff",fontSize:11,fontWeight:700}}>
                              {r["優先度"]==="最高" && <ZapIcon size={11} />}
                              {r["優先度"]}
                            </span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* Log & History */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(340px,1fr))",gap:20}}>
          {/* Log */}
          <div style={{background:"#fff",borderRadius:20,boxShadow:"0 4px 24px rgba(0,0,0,0.06)",border:"1px solid #e2e8f0",overflow:"hidden"}}>
            <div style={{padding:"10px 20px",background:"#1e293b",display:"flex",alignItems:"center",gap:8}}>
              <span style={{display:"flex",gap:6}}><span style={{width:10,height:10,borderRadius:999,background:"#ef4444"}}/><span style={{width:10,height:10,borderRadius:999,background:"#eab308"}}/><span style={{width:10,height:10,borderRadius:999,background:"#22c55e"}}/></span>
              <span className="font-mono" style={{fontSize:11,color:"#64748b",marginLeft:8}}>実行ログ</span>
            </div>
            <div ref={logRef} className="terminal" style={{padding:16,maxHeight:260,overflowY:"auto"}}>
              {logs.length === 0 ? (
                <p className="font-mono" style={{fontSize:12,color:"#475569"}}>
                  エリアと業種を選んで「収集開始」を押してください...
                </p>
              ) : logs.map((l,i) => (
                <div key={i} className="font-mono" style={{fontSize:11,marginBottom:2}}>
                  <span style={{color:"#64748b"}}>[{l.time}]</span>{" "}
                  <span style={{color:l.msg.includes("完了")||l.msg.includes("🎉")?"#4ade80":l.msg.includes("最高")?"#f87171":l.msg.includes("高")?"#fb923c":"#cbd5e1"}}>{l.msg}</span>
                </div>
              ))}
            </div>
          </div>

          {/* History */}
          <div style={{background:"#fff",borderRadius:20,boxShadow:"0 4px 24px rgba(0,0,0,0.06)",border:"1px solid #e2e8f0",overflow:"hidden"}}>
            <div style={{padding:"14px 20px",borderBottom:"1px solid #f1f5f9"}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#334155",display:"flex",alignItems:"center",gap:8}}>
                <ClockIcon size={14} cls="text-gray-400" /> 収集履歴
              </h3>
            </div>
            <div style={{padding:16,maxHeight:260,overflowY:"auto"}}>
              {history.length === 0 ? (
                <p style={{fontSize:12,color:"#94a3b8",textAlign:"center",padding:24}}>まだ履歴がありません</p>
              ) : history.map((h,i) => (
                <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#f8fafc",borderRadius:12,padding:"10px 16px",marginBottom:8}}>
                  <div>
                    <span style={{fontSize:13,fontWeight:600,color:"#334155"}}>{h.area}</span>
                    <span style={{margin:"0 8px",color:"#cbd5e1"}}>×</span>
                    <span style={{fontSize:13,color:"#64748b"}}>{catEmoji(h.category)} {h.category}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span className="font-mono" style={{fontSize:11,color:"#64748b"}}>{h.count}件</span>
                    <div style={{display:"flex",gap:4}}>
                      <span style={{padding:"2px 6px",fontSize:10,borderRadius:6,background:"#fee2e2",color:"#dc2626",fontWeight:700}}>{h.saikou}</span>
                      <span style={{padding:"2px 6px",fontSize:10,borderRadius:6,background:"#ffedd5",color:"#ea580c",fontWeight:700}}>{h.kou}</span>
                      <span style={{padding:"2px 6px",fontSize:10,borderRadius:6,background:"#e0f2fe",color:"#0284c7",fontWeight:700}}>{h.chuu}</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* Footer */}
        <div style={{marginTop:40,textAlign:"center",fontSize:11,color:"#94a3b8",paddingBottom:24}}>
          <p style={{fontWeight:600}}>MAP Lead Collector</p>
          <p style={{marginTop:4}}>デモモード動作中 ・ 本番利用時は config.py に APIキーを設定</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
